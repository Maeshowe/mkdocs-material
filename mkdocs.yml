site_name: PROMPT AI MK Docs
site_description: Documentation for the PROMPT AI project
site_author: Tamás Sáfrány
site_url: https://ssh.services/
theme:
  name: material
  font:
    text: Merriweather Sans
    code: Red Hat Mono
  icon:
    logo: fontawesome/solid/t
  features:
    - navigation.footer
  palette:
    #Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: green
      accent: deep purple

    #Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: blue
      accent: deep orange

markdown_extensions:
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format 
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details

extra:
    social:
    - icon: simple/youtube
      link: https://www.youtube.com/@sshservices
    - icon: simple/x
      link: https://x.com/sshservices
    - icon: simple/discord
      link: https://discord.gg/sshservices
    
copyright: Copyright &copy; 2025 SSH Services